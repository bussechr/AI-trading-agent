name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  root-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .:fx-quant-stack/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install root deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pyyaml numpy pandas scipy requests flask flask-cors pydantic pydantic-settings
      - name: Run root compatibility tests
        run: |
          python -m pytest -q \
            tests/test_audit_tools.py \
            tests/test_trader_cli.py \
            tests/test_runtime_service_v2.py \
            tests/test_decision_pipeline.py \
            tests/test_trader_cli_fxstack_commands.py

  unit-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install fxstack deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ./fx-quant-stack
          pip install pytest
      - name: Run unit-core suite
        working-directory: fx-quant-stack
        env:
          PYTHONPATH: src
          FXSTACK_DATA_PROVIDER: dukascopy
          FXSTACK_DUKASCOPY_SOURCE_ROOT: ./data/dukascopy
          FXSTACK_DATABASE_URL: sqlite+pysqlite:///./test_runtime.db
        run: |
          python -m pytest -q \
            tests/test_provider_contracts.py \
            tests/test_portfolio_package.py \
            tests/test_capital_governance.py \
            tests/test_phase3_risk_kernel.py

  integration-services:
